app = 'siteguard-delta'
primary_region = 'jnb'

[build]
  dockerfile = "Dockerfile"

[build.args]
  VITE_API_URL      = "https://hybrid-vector-api.fly.dev"
  VITE_TENANT_ID    = "siteguard-demo"
  VITE_HV_API_KEY   = "siteguard-key-2026"

[http_service]
  internal_port     = 8080
  force_https       = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes         = ['app']

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
